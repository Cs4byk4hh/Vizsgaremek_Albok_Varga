<mat-dialog-content>
  <div *ngIf="cartItems.length === 0">
    A kosarad üres.
  </div>

  <mat-list *ngIf="cartItems.length > 0">
    <mat-list-item *ngFor="let item of cartItems">
      <div class="w-full flex justify-between items-center">
        <div>
          <b>{{ item.parfumok.name }}</b> – {{ item.parfumok.brand }}
          <div class="text-sm text-gray-500">
            {{ item.mennyiseg }} db × {{ item.ar }} Ft
          </div>
        </div>
        <div>
          <b>{{ item.mennyiseg * item.ar }} Ft</b>
        </div>
      </div>
    </mat-list-item>
  </mat-list>
</mat-dialog-content>
